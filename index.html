<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Input Data</title>

<!-- ICON LIBRARY -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== STYLE DARK GREEN ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html, body{
  width:100%;
  overflow-x:hidden;
}

body{
  background:#0F1115;
  padding:20px;
  user-select:none;
  -webkit-user-select:none;
  color:#D8FFD8;
}

.container{
  max-width:500px;
  margin:auto;
  background:#171A21;
  border-radius:24px;
  padding:20px;
  border:1px solid #222831;

  box-shadow:
  0 0 20px rgba(0,255,120,0.08),
  0 0 40px rgba(255,0,80,0.05);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:24px;
  font-weight:900;
  color:#00FF88;
  letter-spacing:1px;
}

.online-box{
  background:#11151C;
  border:1px solid #2A313C;
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
}

.online-title{
  font-size:15px;
  font-weight:bold;
  margin-bottom:12px;
  color:#9CFFA7;
  letter-spacing:1px;
}

.online-list{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.user-online{
  min-width:90px;
  text-align:center;
}

.user-icon{
  width:50px;
  height:50px;
  border-radius:50%;
  margin:auto;
  position:relative;
  border:2px solid #2A313C;
  background:#171A21;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:#9CA3AF;
}

.online-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  position:absolute;
  bottom:4px;
  right:4px;
  border:2px solid #171A21;
}

.dot-online{
  background:#00FF88;
}

.dot-offline{
  background:#FF3B3B;
}

.user-name{
  font-size:13px;
  font-weight:bold;
  color:#E8FFE8;
}

.user-status{
  font-size:11px;
  color:#8B949E;
}

.user-time{
  font-size:10px;
  color:#7E8793;
}

.label{
  margin-bottom:8px;
  font-weight:bold;
  color:#9CFFA7;
  letter-spacing:1px;
  font-size:12px;
}

input{
  width:100%;
  height:52px;
  padding:0 14px;
  border:1px solid #2A313C;
  border-radius:14px;
  margin-bottom:15px;
  font-size:15px;
  text-transform:uppercase;
  background:#11151C;
  color:#E8FFE8;
}

input:focus{
  outline:none;
  border:2px solid #00FF88;
  background:#0F1319;
}

.preview{
  background:#11151C;
  border:1px solid #2A313C;
  border-radius:16px;
  padding:18px;
  margin-bottom:15px;
  text-align:center;
  font-size:24px;
  font-weight:900;
  color:#00FF88;
  letter-spacing:1px;
}

button{
  width:100%;
  height:52px;
  border:none;
  border-radius:14px;
  font-size:15px;
  cursor:pointer;
  margin-bottom:10px;
  font-weight:900;
  letter-spacing:1px;
}

.btn-save{
  background:linear-gradient(
  135deg,
  #00FF88,
  #00CC6A
  );
  color:#000;
}

.btn-reset{
  background:#FF3B3B;
  color:white;
}

.btn-wa{
  background:#1D2630;
  color:#00FF88;
  border:1px solid #2A313C;
}

.history{
  margin-top:25px;
}

.history h2{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin:25px 0 15px;
  color:#00FF88;
  letter-spacing:1px;
}

#listRiwayat{
  background:#11151C;
  border:1px solid #2A313C;
  border-radius:16px;
  padding:15px;
  font-size:18px;
  font-weight:bold;
  line-height:1.8;
}

.data-item{
  color:#D8FFD8;
}

.data-kembar{
  color:#FF4D4D;
}

.footer{
  text-align:center;
  margin-top:30px;
  font-size:11px;
  color:#7E8793;
  line-height:1.8;
  letter-spacing:1px;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.modal-box{
  background:#171A21;
  width:100%;
  max-width:360px;
  border-radius:24px;
  padding:22px;
  text-align:center;
  border:1px solid #2A313C;

  box-shadow:
  0 0 20px rgba(0,255,120,0.08),
  0 0 40px rgba(255,0,80,0.05);

  animation:pop .18s ease;
}

.modal-box h3{
  font-size:22px;
  margin-bottom:10px;
  color:#00FF88;
}

.modal-box p{
  font-size:14px;
  color:#8B949E;
  margin-bottom:18px;
  line-height:1.5;
}

.modal-box input{
  width:100%;
  height:50px;
  border-radius:14px;
  border:1px solid #2A313C;
  margin-bottom:15px;
}

.btn-login{
  background:linear-gradient(
  135deg,
  #00FF88,
  #00CC6A
  );
  color:#000;
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  font-weight:900;
}

.modal-btn{
  display:flex;
  gap:10px;
  width:100%;
}

.modal-btn button{
  flex:1;
  height:50px;
  border:none;
  border-radius:14px;
  font-weight:900;
}

.btn-ok{
  background:#FF3B3B;
  color:white;
}

.btn-cancel{
  background:#1D2630;
  color:#D8FFD8;
  border:1px solid #2A313C;
}

.btn-info{
  background:linear-gradient(
  135deg,
  #00FF88,
  #00CC6A
  );
  color:#000;
  width:100%;
}

@keyframes pop{
  from{
    transform:scale(.9);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>Penginputan Data Phase</h1>

<div class="online-box">
  <div class="online-title">User Online</div>
  <div class="online-list" id="onlineList"></div>
</div>

<div class="label">Nomor Phase</div>
<input type="text" id="phase" placeholder="Contoh: xxxB/xxxN"/>

<div class="label">Nomor Bag dan Tim</div>
<input type="text" id="angka" placeholder="Contoh: xxxD"/>

<div class="preview" id="preview"></div>

<button class="btn-save" onclick="simpanData()">Simpan Data</button>
<button class="btn-reset" onclick="resetSemua()">Reset Semua Data</button>
<button class="btn-wa" onclick="kirimWA()">Kirim ke WhatsApp</button>

<div class="history">
  <h2>DATA TERKUMPUL</h2>
  <div id="listRiwayat"></div>
</div>

<div class="footer">
© 2026 ZULFAHMI AFNULA — ALL RIGHTS RESERVED<br>
INPUT MANUAL DATA PHASE SYSTEM V1.0<br>
WAKTU AKSES: <span id="waktuAkses"></span>
</div>

</div>

<!-- LOGIN -->
<div class="modal" id="modalLogin">
  <div class="modal-box">
    <h3>Masukkan Nama</h3>
    <p>Silakan login untuk melanjutkan</p>
    <input type="text" id="namaUser" placeholder="Nama pengguna"/>
    <button class="btn-login" onclick="loginUser()">Masuk</button>
  </div>
</div>

<!-- INFO -->
<div class="modal" id="modalInfo">
  <div class="modal-box">
    <h3>Info</h3>
    <p id="infoText"></p>
    <button class="btn-info" onclick="tutupInfo()">OK</button>
  </div>
</div>

<!-- RESET -->
<div class="modal" id="modalReset">
  <div class="modal-box">
    <h3>Konfirmasi Reset</h3>
    <p>Yakin ingin menghapus semua data?</p>

    <div class="modal-btn">
      <button class="btn-cancel" onclick="tutupReset()">Batal</button>
      <button class="btn-ok" onclick="konfirmasiReset()">Hapus</button>
    </div>

  </div>
</div>

<!-- AUDIO -->
<audio id="soundSave" src="notif1.mp3"></audio>
<audio id="soundWarn" src="notif2.mp3"></audio>
<audio id="soundReset" src="notif3.mp3"></audio>

<!-- ================= REALTIME ONLINE SYSTEM ================= -->

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL =
'https://wepqievfgfqsoilynrhc.supabase.co';

const SUPABASE_KEY =
'sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1';

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* ================= ELEMENT ================= */

const phase=document.getElementById("phase");
const angka=document.getElementById("angka");
const preview=document.getElementById("preview");
const listRiwayat=document.getElementById("listRiwayat");
const modalLogin=document.getElementById("modalLogin");
const namaUser=document.getElementById("namaUser");
const onlineList=document.getElementById("onlineList");
const modalInfo=document.getElementById("modalInfo");
const modalReset=document.getElementById("modalReset");
const infoText=document.getElementById("infoText");
const waktuAkses=document.getElementById("waktuAkses");

const soundSave=document.getElementById("soundSave");
const soundWarn=document.getElementById("soundWarn");
const soundReset=document.getElementById("soundReset");

/* ================= DATA ================= */

let semuaData=[];
let namaLogin="";
let userId="";

/* ================= REALTIME PRESENCE ================= */

let presenceChannel=null;
let onlineUsers={};

/* ================= WAKTU ================= */

const now=new Date();
waktuAkses.innerText=now.toLocaleString("id-ID");

/* ================= LOGIN ================= */

modalLogin.style.display="flex";

/* ================= ENTER ================= */

namaUser.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    loginUser();
  }
});

angka.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    simpanData();
  }
});

/* ================= LOGIN USER ================= */

async function loginUser(){

  let nama=namaUser.value.trim();

  if(!nama){

    soundWarn.currentTime=0;
    soundWarn.play().catch(()=>{});

    showInfo("Nama tidak boleh kosong");
    return;
  }

  nama=nama.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());

  namaLogin=nama;

  userId=localStorage.getItem("phase_user_id");

  if(!userId){

    userId=crypto.randomUUID();

    localStorage.setItem(
      "phase_user_id",
      userId
    );

  }

  const { data:cekUser } = await supabaseClient
    .from("phase_user_login")
    .select("*")
    .eq("user_id",userId)
    .maybeSingle();

  if(cekUser){

    if(cekUser.nama !== namaLogin){

      soundWarn.currentTime=0;
      soundWarn.play().catch(()=>{});

      showInfo(
        "Username berbeda dengan login pertama di perangkat ini"
      );

      return;
    }

  }else{

    await supabaseClient
      .from("phase_user_login")
      .insert([{
        user_id:userId,
        nama:namaLogin
      }]);

  }

  modalLogin.style.display="none";

  /* ================= REALTIME ONLINE ================= */

  await initRealtimePresence();

  /* ================= LOAD DATA ================= */

  await loadData();

}

/* ================= REALTIME PRESENCE ================= */

async function initRealtimePresence(){

  presenceChannel =
    supabaseClient.channel(
      "online-users",
      {
        config:{
          presence:{
            key:userId
          }
        }
      }
    );

  presenceChannel

    .on(
      "presence",
      { event:"sync" },
      ()=>{

        const state =
          presenceChannel.presenceState();

        onlineUsers={};

        Object.keys(state).forEach(key=>{

          const userData=state[key][0];

          onlineUsers[key]={

            nama:userData.nama,
            online:true

          };

        });

        renderRealtimeOnline();

      }
    )

    .subscribe(async(status)=>{

      if(status==="SUBSCRIBED"){

        await presenceChannel.track({

          user_id:userId,
          nama:namaLogin,
          online_at:new Date().toISOString()

        });

      }

    });

}

/* ================= RENDER ONLINE ================= */

function renderRealtimeOnline(){

  let html="";

  Object.values(onlineUsers).forEach(user=>{

    html+=`

      <div class="user-online">

        <div class="user-icon">

          <i class="fa-solid fa-user"></i>

          <div class="online-dot dot-online"></div>

        </div>

        <div class="user-name">
          ${user.nama}
        </div>

        <div class="user-status">
          Online
        </div>

      </div>

    `;

  });

  onlineList.innerHTML=html;

}

/* ================= HANDLE TAB CLOSE ================= */

window.addEventListener(
  "beforeunload",
  async()=>{

    if(presenceChannel){

      await presenceChannel.untrack();

    }

  }
);

/* ================= FIX TAB BACK ================= */

document.addEventListener(
  "visibilitychange",
  async()=>{

    if(
      !document.hidden &&
      presenceChannel
    ){

      await presenceChannel.track({

        user_id:userId,
        nama:namaLogin,
        online_at:new Date().toISOString()

      });

    }

  }
);

/* ================= LOAD DATA ================= */

async function loadData(){

  const { data,error } =
    await supabaseClient
      .from("phase_input_data")
      .select("*")
      .eq("user_id",userId)
      .order("id",{ascending:true});

  if(error){

    console.log(error);
    return;

  }

  semuaData=
    data.map(item=>item.hasil) || [];

  renderData();

}

/* ================= PREVIEW ================= */

function updatePreview(){

  phase.value=
    phase.value.toUpperCase();

  angka.value=
    angka.value.toUpperCase();

  preview.innerHTML=
    phase.value+angka.value;

}

phase.oninput=updatePreview;
angka.oninput=updatePreview;

/* ================= SIMPAN DATA ================= */

async function simpanData(){

  if(!angka.value.trim()){

    soundWarn.currentTime=0;
    soundWarn.play().catch(()=>{});

    showInfo("Input masih kosong");

    return;
  }

  const hasil=
    phase.value+angka.value;

  soundSave.currentTime=0;

  soundSave.play().catch(()=>{});

  const { error } =
    await supabaseClient
      .from("phase_input_data")
      .insert([{

        user_id:userId,
        nama:namaLogin,
        phase:phase.value,
        angka:angka.value,
        hasil:hasil

      }]);

  if(error){

    console.log(error);

    showInfo(
      "Gagal simpan data"
    );

    return;
  }

  semuaData.push(hasil);

  renderData();

  angka.value="";

  updatePreview();

}

/* ================= RENDER DATA ================= */

function renderData(){

  let html="";

  semuaData.forEach(v=>{

    let dup=
      semuaData.filter(
        x=>x===v
      ).length;

    html+=`

      <div class="${
        dup>1
        ? 'data-kembar'
        : 'data-item'
      }">

        ${v}

      </div>

    `;

  });

  listRiwayat.innerHTML=html;

}

/* ================= RESET ================= */

function resetSemua(){

  modalReset.style.display="flex";

}

function tutupReset(){

  modalReset.style.display="none";

}

async function konfirmasiReset(){

  const { error } =
    await supabaseClient
      .from("phase_input_data")
      .delete()
      .eq("user_id",userId);

  if(error){

    showInfo(
      "Gagal reset data"
    );

    return;
  }

  semuaData=[];

  soundReset.currentTime=0;

  soundReset.play().catch(()=>{});

  renderData();

  tutupReset();

  showInfo(
    "Data berhasil direset"
  );

}

/* ================= INFO ================= */

function showInfo(msg){

  infoText.innerText=msg;

  modalInfo.style.display="flex";

}

function tutupInfo(){

  modalInfo.style.display="none";

}

/* ================= WHATSAPP ================= */

function kirimWA(){

  if(!semuaData.length){

    soundWarn.currentTime=0;

    soundWarn.play().catch(()=>{});

    showInfo(
      "Belum ada data"
    );

    return;
  }

  window.open(

    "https://wa.me/?text="+
    encodeURIComponent(
      semuaData.join("\n")
    ),

    "_blank"

  );

}

</script>

</body>
</html>
